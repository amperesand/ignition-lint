name: 'ignition-lint-toolkit'
description: 'Lint Ignition SCADA projects: validate views, scripts, naming conventions, expressions, and code quality.'
author: 'Patrick Mannion'

inputs:
  version:
    description: 'Version of ignition-lint-toolkit to install from PyPI. Leave blank to use this action checkout.'
    required: false
    default: ''
  files:
    description: 'Comma-separated file globs for naming-only linting. Prefer target for CI enforcement.'
    required: false
    default: ''
  target:
    description: 'Path to any directory; recursively lints all view.json and .py files found'
    required: false
    default: ''
  component_style:
    description: 'Naming convention style for components'
    required: false
    default: 'PascalCase'
  parameter_style:
    description: 'Naming convention style for parameters'
    required: false
    default: 'camelCase'
  component_style_rgx:
    description: 'Custom regex pattern for component naming'
    required: false
  parameter_style_rgx:
    description: 'Custom regex pattern for parameter naming'
    required: false
  allow_acronyms:
    description: 'Allow acronyms in component and parameter names'
    required: false
    default: 'false'
  project_path:
    description: 'Path to Ignition project directory (alternative to files)'
    required: false
    default: ''
  lint_type:
    description: 'Legacy lint preset (perspective, scripts, naming, all). Prefer profile or checks for new workflows.'
    required: false
    default: ''
  profile:
    description: 'Lint profile (default, full, perspective-only, scripts-only, naming-only)'
    required: false
    default: ''
  checks:
    description: 'Comma-separated checks to run (perspective,naming,scripts)'
    required: false
    default: ''
  naming_only:
    description: 'Only run naming convention checks, skip empirical linter'
    required: false
    default: 'false'
  ignore_codes:
    description: 'Comma-separated rule codes to suppress globally'
    required: false
    default: ''
  schema_mode:
    description: 'Schema strictness level (strict, robust, permissive)'
    required: false
    default: 'robust'
  fail_on:
    description: 'Minimum severity that causes a non-zero exit (error, warning, info, style)'
    required: false
    default: 'error'
  component:
    description: 'Filter Perspective linting to a specific component type prefix (e.g. ia.display.label)'
    required: false
  report_format:
    description: 'Output format (text or json)'
    required: false
    default: 'text'
  ignore_file:
    description: 'Path to .ignition-lintignore-compatible ignore file'
    required: false
    default: ''

outputs:
  result:
    description: 'Linting result (success or failure)'

branding:
  icon: 'check-circle'
  color: 'orange'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install ignition-lint-toolkit
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ -n "${{ inputs.version }}" ]; then
          pip install "ignition-lint-toolkit==${{ inputs.version }}"
        else
          export SETUPTOOLS_SCM_PRETEND_VERSION="0.0.0+action"
          export SETUPTOOLS_SCM_PRETEND_VERSION_FOR_IGNITION_LINT_TOOLKIT="0.0.0+action"
          pip install "$GITHUB_ACTION_PATH"
        fi

    - name: Run Ignition Lint
      shell: bash
      env:
        INPUT_FILES: ${{ inputs.files }}
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_COMPONENT_STYLE: ${{ inputs.component_style }}
        INPUT_PARAMETER_STYLE: ${{ inputs.parameter_style }}
        INPUT_COMPONENT_STYLE_RGX: ${{ inputs.component_style_rgx }}
        INPUT_PARAMETER_STYLE_RGX: ${{ inputs.parameter_style_rgx }}
        INPUT_ALLOW_ACRONYMS: ${{ inputs.allow_acronyms }}
        INPUT_PROJECT_PATH: ${{ inputs.project_path }}
        INPUT_LINT_TYPE: ${{ inputs.lint_type }}
        INPUT_PROFILE: ${{ inputs.profile }}
        INPUT_CHECKS: ${{ inputs.checks }}
        INPUT_NAMING_ONLY: ${{ inputs.naming_only }}
        INPUT_IGNORE_CODES: ${{ inputs.ignore_codes }}
        INPUT_IGNORE_FILE: ${{ inputs.ignore_file }}
        INPUT_SCHEMA_MODE: ${{ inputs.schema_mode }}
        INPUT_FAIL_ON: ${{ inputs.fail_on }}
        INPUT_REPORT_FORMAT: ${{ inputs.report_format }}
        INPUT_COMPONENT: ${{ inputs.component }}
      run: ignition-lint-action
